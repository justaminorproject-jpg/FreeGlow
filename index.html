<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FreeGlow ✨</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6D28D9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FreeGlow">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F5FF;font-family:system-ui,-apple-system,sans-serif;padding-bottom:60px}
.hero{background:linear-gradient(135deg,#4C1D95,#6D28D9,#7C3AED);padding:2rem 1.5rem 3.5rem;position:relative;overflow:hidden}
.b1{position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.06)}
.b2{position:absolute;bottom:-60px;left:-25px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.04)}
.b3{position:absolute;top:35%;right:18%;width:70px;height:70px;border-radius:50%;background:rgba(251,191,36,0.14)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;z-index:1}
.logo-box{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo-free{font-size:25px;font-weight:900;color:#fff;font-family:Georgia,serif}
.logo-glow{font-size:25px;font-weight:900;font-family:Georgia,serif;background:linear-gradient(90deg,#FDE68A,#FCD34D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.8);position:relative;z-index:1}
.wrap{max-width:560px;margin:-1.75rem auto 0;padding:0 1rem;position:relative;z-index:2}
.card{background:#fff;border-radius:16px;padding:1.2rem;box-shadow:0 2px 16px rgba(109,40,217,0.09);margin-bottom:12px}
.lbl{font-size:11px;font-weight:700;letter-spacing:.09em;color:#9CA3AF;text-transform:uppercase;margin-bottom:8px;display:block}
.hdiv{border:none;border-top:1px solid #F3F4F6;margin:12px 0}
#locIn{width:100%;padding:10px 14px;font-size:15px;border:2px solid #EDE9FE;border-radius:10px;outline:none;color:#111;background:#FAFAFA;font-family:inherit;margin-bottom:14px}
#locIn:focus{border-color:#8B5CF6}
.age-row{display:flex;flex-wrap:wrap;gap:6px}
.abtn{padding:7px 12px;border-radius:20px;font-size:13px;font-weight:700;border:2px solid #E5E7EB;cursor:pointer;background:#fff;color:#6B7280;font-family:inherit;line-height:1.3;transition:all .15s}
.abtn.on{background:linear-gradient(135deg,#6D28D9,#7C3AED);color:#fff;border-color:#6D28D9}
.abtn small{display:block;font-size:10px;opacity:.75}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.75);border-radius:12px;padding:4px;margin-bottom:12px}
.tbtn{flex:1;padding:9px 0;font-size:13px;font-weight:700;border:none;border-radius:9px;cursor:pointer;background:transparent;color:#9CA3AF;font-family:inherit;transition:all .15s}
.tbtn.on{background:linear-gradient(135deg,#6D28D9,#7C3AED);color:#fff}
.dow-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dbtn{width:42px;height:42px;border-radius:50%;font-size:13px;font-weight:700;border:2px solid #E5E7EB;cursor:pointer;background:#fff;color:#6B7280;font-family:inherit;transition:all .15s}
.dbtn.on{background:linear-gradient(135deg,#6D28D9,#7C3AED);color:#fff;border-color:#6D28D9}
.la-row{display:flex;gap:6px}
.lbtn{flex:1;padding:7px 0;font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;border:2px solid #E5E7EB;background:#fff;color:#6B7280;font-family:inherit;transition:all .15s}
.lbtn.on{background:#EDE9FE;color:#6D28D9;border-color:#6D28D9}
.sfoot{margin-top:10px;padding-top:10px;border-top:1px solid #F3F4F6;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#9CA3AF}
.sfoot strong{color:#111}
#clearBtn{font-size:12px;color:#6D28D9;font-weight:700;background:none;border:none;cursor:pointer;display:none;font-family:inherit}
/* CALENDAR TABLE */
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-mo{font-size:16px;font-weight:800;color:#111}
.cal-nav{display:flex;gap:6px}
.arrow{width:30px;height:30px;border-radius:8px;border:1.5px solid #E5E7EB;background:#fff;cursor:pointer;font-size:16px;color:#6B7280;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0}
.caltable{width:100%;border-collapse:collapse;table-layout:fixed}
.caltable th{font-size:11px;font-weight:700;color:#C4B5FD;padding:4px 0;text-align:center;letter-spacing:.04em}
.caltable td{padding:2px}
.cday{width:100%;height:40px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;font-size:13px;font-weight:400;color:#111;background:transparent;font-family:inherit;display:block;transition:all .12s}
.cday:hover{background:#F3F4F6}
.cday.past{color:#D1D5DB;cursor:default}
.cday.past:hover{background:transparent}
.cday.today{border-color:#A78BFA}
.cday.free{background:linear-gradient(135deg,#EDE9FE,#DDD6FE);color:#6D28D9;font-weight:700;border-color:#C4B5FD}
.cday.oadded{background:#D1FAE5;color:#065F46;font-weight:700;border-color:#6EE7B7}
.cday.oremoved{border:1.5px dashed #FCA5A5;color:#EF4444}
.cal-hint{font-size:12px;color:#A78BFA;margin-top:10px;text-align:center;font-style:italic}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;padding-left:2px}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:#6B7280}
.ldot{width:11px;height:11px;border-radius:3px;display:inline-block;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;min-height:4px}
.chip{display:inline-flex;align-items:center;gap:4px;background:#EDE9FE;color:#6D28D9;font-size:12px;font-weight:600;padding:4px 11px;border-radius:18px;border:1px solid #C4B5FD}
.chip-x{cursor:pointer;font-size:14px;opacity:.5;line-height:1;background:none;border:none;color:#6D28D9;font-family:inherit;padding:0}
#errBox{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:11px 14px;font-size:13px;color:#991B1B;margin-bottom:12px;display:none}
.btn-p{width:100%;padding:14px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#6D28D9,#7C3AED);color:#fff;border:none;border-radius:12px;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 14px rgba(109,40,217,.3);font-family:inherit}
.btn-p:disabled{background:#C4B5FD;box-shadow:none;cursor:default}
.btn-t{width:100%;padding:14px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#0F766E,#0D9488);color:#fff;border:none;border-radius:12px;cursor:pointer;margin-bottom:1.5rem;box-shadow:0 4px 14px rgba(13,148,136,.3);font-family:inherit}
.btn-t:disabled{background:#99F6E4;box-shadow:none;cursor:default}
.loading{text-align:center;padding:2rem;color:#6B7280;font-size:14px}
.loading .ico{font-size:34px;margin-bottom:8px}
.sdiv{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sline{flex:1;height:1px;background:#EDE9FE}
.stxt{font-size:11px;font-weight:700;color:#6D28D9;letter-spacing:.08em;text-transform:uppercase}
.dsec{margin-bottom:1.5rem}
.dhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dbadge{background:linear-gradient(135deg,#6D28D9,#7C3AED);border-radius:9px;padding:4px 11px;font-size:12px;font-weight:800;color:#fff}
.dline{flex:1;height:1px;background:#E5E7EB}
.ecard{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:9px;box-shadow:0 2px 12px rgba(109,40,217,.07);border:1px solid #EAECF0;display:flex;gap:12px}
.eico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.ename{font-size:14px;font-weight:800;color:#111;margin-bottom:3px;line-height:1.3}
.emeta{font-size:12px;color:#9CA3AF;margin-bottom:6px}
.edesc{font-size:13px;color:#374151;line-height:1.55;margin-bottom:7px}
.etip{background:#FEF3C7;border-radius:7px;padding:6px 10px;font-size:12px;color:#78350F;margin-bottom:7px;line-height:1.5}
.etag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:700}
.muhdr{background:linear-gradient(135deg,#0F766E,#0D9488);border-radius:14px;padding:13px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.mugrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1.5rem}
.mucard{background:#fff;border-radius:14px;padding:13px;box-shadow:0 2px 12px rgba(109,40,217,.07);border:1px solid #EAECF0;display:flex;flex-direction:column;gap:7px}
.mutop{display:flex;align-items:flex-start;gap:9px}
.muico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.muname{font-size:13px;font-weight:800;color:#111;line-height:1.3;margin-bottom:2px}
.mutag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:9px;font-weight:700}
.mudesc{font-size:12px;color:#374151;line-height:1.5}
.mumeta{margin-top:auto;font-size:11px;color:#9CA3AF;display:flex;flex-direction:column;gap:3px}
.muvibe{background:#EDE9FE;color:#6D28D9;border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600;margin-top:2px}
.fbadge{text-align:center;padding:.75rem 0}
.fbadge span{background:#EDE9FE;color:#6D28D9;padding:5px 14px;border-radius:18px;font-weight:600;font-size:12px}
</style>
</head>
<body>
<div class="hero">
  <div class="b1"></div><div class="b2"></div><div class="b3"></div>
  <div class="logo">
    <div class="logo-box">🌅</div>
    <span class="logo-free">Free</span><span class="logo-glow">Glow</span>
  </div>
  <div class="hero-sub">Your days off deserve to shine ✨ — find events &amp; meetups that fit your life</div>
</div>

<div class="wrap">

  <div class="card">
    <label class="lbl">📍 Your Location</label>
    <input id="locIn" type="text" placeholder="City, state or zip — e.g. Atlanta, GA">
    <div class="hdiv"></div>
    <label class="lbl">🎂 Your Age Group</label>
    <div class="age-row" id="ageRow"></div>
  </div>

  <div class="tabs">
    <button class="tbtn on" id="tabS" onclick="setTab('s')">📋 Work Schedule</button>
    <button class="tbtn"    id="tabM" onclick="setTab('m')">✏️ Pick Days Manually</button>
  </div>

  <div class="card" id="schedCard">
    <label class="lbl">Which days do you work?</label>
    <div class="dow-row" id="dowRow"></div>
    <div class="hdiv"></div>
    <label class="lbl">Look Ahead</label>
    <div class="la-row" id="laRow"></div>
    <div class="sfoot">
      <span><strong id="freeCount">0</strong> free days coming up</span>
      <button id="clearBtn" onclick="clearOv()">Clear overrides</button>
    </div>
  </div>

  <div class="card">
    <div class="cal-top">
      <span class="cal-mo" id="calMo">—</span>
      <div class="cal-nav">
        <button class="arrow" onclick="navMo(-1)">&#8249;</button>
        <button class="arrow" onclick="navMo(1)">&#8250;</button>
      </div>
    </div>
    <table class="caltable" id="caltable"></table>
    <p class="cal-hint" id="calHint">Tap any day to override your schedule</p>
  </div>

  <div class="legend" id="legend"></div>
  <div class="chips"  id="chips"></div>
  <div id="errBox"></div>
  <button class="btn-p" id="btnEv" onclick="doEvents()">✨ Find events on my free days</button>
  <button class="btn-t" id="btnMu" onclick="doMeetups()">👥 Find Meetup Groups Near Me</button>
  <div id="results"></div>
</div>

<script>
var MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
var DA=["Su","Mo","Tu","We","Th","Fr","Sa"];
var AGES=[{id:"18-24",l:"18-24",d:"College & Young Adult"},{id:"25-34",l:"25-34",d:"Young Professional"},{id:"35-44",l:"35-44",d:"Mid-Career & Family"},{id:"45-54",l:"45-54",d:"Established & Active"},{id:"55+",l:"55+",d:"Active Seniors"}];
var ECAT={"Social":{bg:"#EDE9FE",tx:"#5B21B6",em:"🤝"},"Outdoors":{bg:"#DCFCE7",tx:"#166534",em:"🌿"},"Food":{bg:"#FEF3C7",tx:"#92400E",em:"🍴"},"Music":{bg:"#FCE7F3",tx:"#9D174D",em:"🎵"},"Arts":{bg:"#E0F2FE",tx:"#075985",em:"🎨"},"Fitness":{bg:"#DCFCE7",tx:"#166534",em:"💪"},"Volunteer":{bg:"#FEF9C3",tx:"#854D0E",em:"🤲"},"Learning":{bg:"#E0F2FE",tx:"#0C4A6E",em:"📚"},"Community":{bg:"#FFF7ED",tx:"#9A3412",em:"🏘️"}};
var MCAT={"Social":{bg:"#EDE9FE",tx:"#5B21B6",em:"🎉"},"Outdoors":{bg:"#DCFCE7",tx:"#166534",em:"🥾"},"Sports":{bg:"#DBEAFE",tx:"#1E40AF",em:"⚽"},"Arts":{bg:"#FCE7F3",tx:"#9D174D",em:"🎨"},"Tech":{bg:"#E0F2FE",tx:"#075985",em:"💻"},"Wellness":{bg:"#FEF9C3",tx:"#854D0E",em:"🧘"},"Books":{bg:"#F3E8FF",tx:"#6B21A8",em:"📖"},"Food/Drink":{bg:"#FFF7ED",tx:"#9A3412",em:"🍻"},"Gaming":{bg:"#EDE9FE",tx:"#4C1D95",em:"🎮"},"Networking":{bg:"#DBEAFE",tx:"#1E3A8A",em:"🤝"},"Music":{bg:"#FCE7F3",tx:"#831843",em:"🎸"},"Volunteering":{bg:"#DCFCE7",tx:"#14532D",em:"💚"}};

var TODAY=new Date(); TODAY.setHours(0,0,0,0);
var vY=TODAY.getFullYear(), vM=TODAY.getMonth();
var curTab="s", ageId="25-34", lookMo=1;
var workD={1:1,2:1,3:1,4:1,5:1};
var addD={}, remD={};

function mk(y,m,d){return y+"-"+(m+1<10?"0":"")+(m+1)+"-"+(d<10?"0":"")+d;}
function kd(k){var p=k.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function kdisp(k){return kd(k).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}

function schFree(){
  var o={},end=new Date(TODAY),cur=new Date(TODAY);
  end.setMonth(end.getMonth()+lookMo);
  while(cur<=end){if(!workD[cur.getDay()])o[mk(cur.getFullYear(),cur.getMonth(),cur.getDate())]=1;cur.setDate(cur.getDate()+1);}
  return o;
}
function free(){
  var o={},k;
  if(curTab==="s"){var sf=schFree();for(k in sf){if(!remD[k])o[k]=1;}for(k in addD){if(!remD[k])o[k]=1;}}
  else{for(k in addD)o[k]=1;}
  return o;
}
function upcoming(){
  var f=free(),a=[],k;
  for(k in f){if(kd(k)>=TODAY)a.push(k);}
  a.sort();return a.slice(0,14);
}

/* age buttons */
(function(){
  var row=document.getElementById("ageRow");
  AGES.forEach(function(a){
    var b=document.createElement("button");
    b.className="abtn"+(a.id===ageId?" on":"");
    b.innerHTML="<span>"+a.l+"</span><small>"+a.d+"</small>";
    b.onclick=function(){
      ageId=a.id;
      document.querySelectorAll(".abtn").forEach(function(x){x.classList.remove("on");});
      b.classList.add("on");
    };
    row.appendChild(b);
  });
})();

/* dow buttons */
(function(){
  var row=document.getElementById("dowRow");
  DA.forEach(function(nm,i){
    var b=document.createElement("button");
    b.className="dbtn"+(workD[i]?" on":"");
    b.textContent=nm;
    b.setAttribute("data-i",i);
    b.onclick=function(){
      var ix=+this.getAttribute("data-i");
      if(workD[ix]){delete workD[ix];}else{workD[ix]=1;}
      this.classList.toggle("on");
      renderAll();
    };
    row.appendChild(b);
  });
})();

/* lookahead buttons */
(function(){
  var row=document.getElementById("laRow");
  [1,2,3].forEach(function(n){
    var b=document.createElement("button");
    b.className="lbtn"+(n===lookMo?" on":"");
    b.textContent=n+" month"+(n>1?"s":"");
    b.setAttribute("data-n",n);
    b.onclick=function(){
      lookMo=+this.getAttribute("data-n");
      document.querySelectorAll(".lbtn").forEach(function(x){x.classList.remove("on");});
      this.classList.add("on");
      renderAll();
    };
    row.appendChild(b);
  });
})();

function setTab(t){
  curTab=t;
  document.getElementById("tabS").className="tbtn"+(t==="s"?" on":"");
  document.getElementById("tabM").className="tbtn"+(t==="m"?" on":"");
  document.getElementById("schedCard").style.display=t==="s"?"block":"none";
  document.getElementById("calHint").style.display=t==="s"?"block":"none";
  renderAll();
}

function toggleDay(k){
  var f=free();
  if(curTab==="s"){if(f[k]){remD[k]=1;delete addD[k];}else{addD[k]=1;delete remD[k];}}
  else{if(addD[k]){delete addD[k];}else{addD[k]=1;}}
  renderAll();
}
function clearOv(){addD={};remD={};renderAll();}
function navMo(d){vM+=d;if(vM>11){vM=0;vY++;}if(vM<0){vM=11;vY--;}renderCal();}

/* CALENDAR — uses HTML table, most reliable across all browsers */
function renderCal(){
  document.getElementById("calMo").textContent=MO[vM]+" "+vY;
  var f=free();
  var tbl=document.getElementById("caltable");
  var firstDow=new Date(vY,vM,1).getDay();
  var dim=new Date(vY,vM+1,0).getDate();
  var html="<thead><tr>";
  for(var i=0;i<7;i++) html+="<th>"+DA[i]+"</th>";
  html+="</tr></thead><tbody><tr>";
  for(var i=0;i<firstDow;i++) html+="<td></td>";
  var col=firstDow;
  for(var d=1;d<=dim;d++){
    var dt=new Date(vY,vM,d);
    var k=mk(vY,vM,d);
    var past=dt<TODAY;
    var isT=dt.getTime()===TODAY.getTime();
    var isFree=!!f[k];
    var isAdd=!!addD[k];
    var isRem=!!remD[k];
    var cls="cday";
    if(past)cls+=" past";
    else if(isFree&&isAdd)cls+=" oadded";
    else if(isFree)cls+=" free";
    else if(isRem)cls+=" oremoved";
    if(isT)cls+=" today";
    var click=past?"":" onclick=\"toggleDay('"+k+"')\"";
    html+="<td><button class=\""+cls+"\""+click+">"+d+"</button></td>";
    col++;
    if(col%7===0&&d<dim) html+="</tr><tr>";
  }
  while(col%7!==0){html+="<td></td>";col++;}
  html+="</tr></tbody>";
  tbl.innerHTML=html;
}

function renderChips(){
  var up=upcoming(),box=document.getElementById("chips"),html="";
  up.slice(0,10).forEach(function(k){
    html+='<span class="chip">'+kdisp(k)+'<button class="chip-x" onclick="toggleDay(\''+k+'\')">&#215;</button></span>';
  });
  if(up.length>10)html+='<span style="font-size:12px;color:#9CA3AF;align-self:center;font-style:italic">+' +(up.length-10)+' more</span>';
  box.innerHTML=html;
}

function renderLegend(){
  var h='<div class="leg"><span class="ldot" style="background:#EDE9FE;border:1.5px solid #C4B5FD"></span>Free day</div>';
  if(curTab==="s"){
    h+='<div class="leg"><span class="ldot" style="background:#D1FAE5;border:1.5px solid #6EE7B7"></span>Added free</div>';
    h+='<div class="leg"><span class="ldot" style="background:transparent;border:1.5px dashed #FCA5A5"></span>Marked working</div>';
  }
  document.getElementById("legend").innerHTML=h;
}

function renderFooter(){
  var up=upcoming();
  document.getElementById("freeCount").textContent=up.length;
  var oc=Object.keys(addD).length+Object.keys(remD).length;
  var cb=document.getElementById("clearBtn");
  cb.style.display=oc>0?"inline":"none";
  cb.textContent="Clear "+oc+" override"+(oc>1?"s":"");
}

function renderBtns(){
  var up=upcoming(),ag=AGES[1];
  for(var i=0;i<AGES.length;i++){if(AGES[i].id===ageId){ag=AGES[i];break;}}
  document.getElementById("btnEv").textContent="✨ Find events on my "+up.length+" free day"+(up.length===1?"":"s");
  document.getElementById("btnMu").textContent="👥 Find "+ag.l+" Meetup Groups Near Me";
}

function renderAll(){renderCal();renderChips();renderLegend();renderFooter();renderBtns();}

/* init */
setTab("s");

function showErr(m){var b=document.getElementById("errBox");if(m){b.textContent="⚠️ "+m;b.style.display="block";}else b.style.display="none";}

function cleanJSON(raw){
  var m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("No JSON in response");
  var s=m[0].replace(/,\s*([}\]])/g,"$1");
  try{return JSON.parse(s);}
  catch(e){
    s=s.replace(/,\s*\{[^}]*$/,"");
    var op=(s.match(/\[/g)||[]).length-(s.match(/\]/g)||[]).length;
    var ob=(s.match(/\{/g)||[]).length-(s.match(/\}/g)||[]).length;
    for(var i=0;i<op;i++)s+="]";
    for(var i=0;i<ob;i++)s+="}";
    return JSON.parse(s.replace(/,\s*([}\]])/g,"$1"));
  }
}

function callAI(prompt){
  return fetch("/api/groq",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",temperature:0.7,max_tokens:2000,messages:[{role:"user",content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.error)throw new Error(d.error.message||"API error");
    var txt=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||"";
    var p=cleanJSON(txt);p._provider=d._provider||"groq";return p;
  });
}

function doEvents(){
  var loc=document.getElementById("locIn").value.trim();
  if(!loc){showErr("Please enter your city or zip code.");return;}
  var up=upcoming();
  if(!up.length){showErr("No upcoming free days found.");return;}
  showErr("");
  var btn=document.getElementById("btnEv");btn.disabled=true;
  var ag=AGES[1];for(var i=0;i<AGES.length;i++){if(AGES[i].id===ageId){ag=AGES[i];break;}}
  var res=document.getElementById("results");
  res.innerHTML='<div class="loading"><div class="ico">🗺️</div><strong>Finding things to do in '+loc+'...</strong></div>';
  var dates=up.map(function(k){return kdisp(k);}).join(", ");
  var prompt='Find upcoming community events in or near "'+loc+'" on: '+dates+'. Person is age '+ag.l+' wanting to meet people. Return ONLY valid JSON no markdown: {"city":"City","events":[{"date":"YYYY-MM-DD","name":"Name","type":"Social|Outdoors|Food|Music|Arts|Fitness|Volunteer|Learning|Community","time":"7:00 PM","venue":"Venue","description":"Two sentences.","tip":"One tip."}]}. 2-4 events per date.';
  callAI(prompt).then(function(data){
    var byD={};up.forEach(function(k){byD[k]=[];});
    (data.events||[]).forEach(function(ev){if(byD[ev.date])byD[ev.date].push(ev);else if(up.length)byD[up[0]].push(ev);});
    var prov=data._provider==="gemini"?"✨ Gemini":"⚡ Groq";
    var h='<div class="sdiv"><div class="sline"></div><div class="stxt">Events near '+(data.city||loc)+'</div><div class="sline"></div></div>';
    up.forEach(function(k){
      var evs=byD[k]||[];if(!evs.length)return;
      h+='<div class="dsec"><div class="dhdr"><div class="dbadge">'+kdisp(k)+'</div><div class="dline"></div></div>';
      evs.forEach(function(ev){
        var c=ECAT[ev.type]||{bg:"#F3F4F6",tx:"#374151",em:"✨"};
        h+='<div class="ecard"><div class="eico" style="background:'+c.bg+'">'+c.em+'</div><div style="flex:1;min-width:0"><div class="ename">'+ev.name+'</div><div class="emeta">🕐 '+ev.time+' · 📍 '+ev.venue+'</div><div class="edesc">'+ev.description+'</div>'+(ev.tip?'<div class="etip">💡 <strong>Tip:</strong> '+ev.tip+'</div>':'')+'<span class="etag" style="background:'+c.bg+';color:'+c.tx+'">'+ev.type+'</span></div></div>';
      });
      h+='</div>';
    });
    h+='<div class="fbadge"><span>🌅 FreeGlow · '+up.length+' day'+(up.length!==1?'s':'')+' · '+(data.city||loc)+' · '+prov+'</span></div>';
    res.innerHTML=h;
  }).catch(function(e){showErr("Could not load events. ("+e.message+")");res.innerHTML="";})
  .finally(function(){btn.disabled=false;});
}
